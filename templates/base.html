<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Học Phần</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .nav { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #0056b3; }
        .nav a { margin-right: 15px; text-decoration: none; color: #0056b3; font-weight: bold; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
        .btn { padding: 8px 15px; background-color: #0056b3; color: white; border: none; cursor: pointer; text-decoration: none;}
        .btn-danger { background-color: #dc3545; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Tra cứu Học phần</a>
        <a href="/admin/hoc-phan">Quản trị Hệ thống</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
